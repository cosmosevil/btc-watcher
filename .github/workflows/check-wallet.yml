name: Check BTC wallet

on:
  schedule:
    # Каждые 5 минут, но со сдвигом на 2 минуты от "круглых" значений
    # (02, 07, 12, 17, 22...), чтобы не попадать в часы пик нагрузки
    # GitHub Actions, которые обычно приходятся на :00, :05, :10 и т.д.
    - cron: "2-59/5 * * * *"
  workflow_dispatch: {}  # позволяет запускать вручную из вкладки Actions

permissions:
  contents: write  # нужно, чтобы воркфлоу мог закоммитить файл состояния

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run wallet check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BTC_ADDRESS: ${{ secrets.BTC_ADDRESS }}
        run: python3 btc_watcher.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add btc_watcher_state.json
          git diff --staged --quiet || git commit -m "Update wallet watcher state [skip ci]"
          git push