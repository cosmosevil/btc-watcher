name: Daily BTC summary

on:
  schedule:
    # Каждый день в 20:59 UTC (23:59 МСК)
    - cron: "59 20 * * *"
  workflow_dispatch: {}  # можно запустить вручную для теста

permissions:
  contents: write

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BTC_ADDRESS: ${{ secrets.BTC_ADDRESS }}
          DAILY_SUMMARY: "true"
        run: python3 btc_watcher.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add btc_watcher_state.json
          git diff --staged --quiet || git commit -m "Update wallet watcher state [skip ci]"
          git push